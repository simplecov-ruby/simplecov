name: Push Gem

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  push:
    if: github.repository == 'simplecov-ruby/simplecov'
    runs-on: ubuntu-latest

    environment:
      name: rubygems.org
      url: https://rubygems.org/gems/simplecov

    permissions:
      contents: write
      id-token: write

    steps:
      # Set up
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          bundler-cache: true
          ruby-version: ruby

      # Publish. `rake release` already built and pushed the vX.Y.Z tag that
      # triggered this run, so here we only build, sign, and push the gem, then
      # open the matching GitHub Release.
      - uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
      - name: Update RubyGems
        run: gem update --system
      - name: Build gem
        run: bundle exec rake build
      - name: Sign gem with Sigstore
        run: gem exec sigstore-cli sign pkg/*.gem --bundle pkg/simplecov.gem.sigstore.json
      - name: Push gem
        run: gem push pkg/*.gem --attestation pkg/simplecov.gem.sigstore.json
      - name: Wait for release to propagate
        run: gem exec rubygems-await pkg/*.gem

      # release-gem used to open the GitHub Release; do it explicitly now. Mark
      # it as a pre-release when the gem version is a prerelease (e.g. 1.0.0.rc1)
      # so it does not show as "Latest" or nudge `gem install` users toward it.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          flags=(--generate-notes --verify-tag)
          if [ "$(ruby -Ilib -rsimplecov/version -e 'print Gem::Version.new(SimpleCov::VERSION).prerelease?')" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" "${flags[@]}"
