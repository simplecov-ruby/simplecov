name: unstable

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      BUNDLE_WITHOUT: "benchmark"
      JRUBY_OPTS: "--debug"
    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest]
        ruby-version:
          - ruby-head
          - jruby-head
          - truffleruby-head
        include:
          - os: macos-latest
            ruby-version: ruby-head
          - os: windows-latest
            ruby-version: ruby-head

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test
        if: "!contains(matrix.ruby-version, 'jruby') && matrix.ruby-version != 'truffleruby-head' && matrix.os != 'windows-latest'"

      # Run only `rake spec` on truffleruby, jruby, and Windows. `rake` runs
      # cucumber which requires headless Chrome via cuprite/ferrum, which is
      # unreliable on alternative Ruby implementations and on Windows runners.
      - name: Run specs only
        run: bundle exec rake spec
        if: "contains(matrix.ruby-version, 'jruby') || matrix.ruby-version == 'truffleruby-head' || matrix.os == 'windows-latest'"
