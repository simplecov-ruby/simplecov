name: stable

on: [push, pull_request]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    env:
      BUNDLE_WITHOUT: "benchmark"
      JRUBY_OPTS: "--debug"
    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest]
        ruby-version:
          - '3.2'
          - '3.3'
          - '3.4'
          - '4.0'
          - jruby-10.0
          - truffleruby
        include:
          - os: macos-latest
            ruby-version: ruby
          - os: windows-latest
            ruby-version: ruby

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Remove Gemfile.lock
        run: rm Gemfile.lock
        shell: bash

      - uses: ruby/setup-ruby@v1.312.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          rubygems: default
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test
        if: "!contains(matrix.ruby-version, 'jruby') && matrix.ruby-version != 'truffleruby' && matrix.os != 'windows-latest'"

      # Run only `rake spec` on truffleruby, jruby, and Windows. `rake` runs
      # cucumber which requires headless Chrome via cuprite/ferrum, which is
      # unreliable on alternative Ruby implementations and on Windows runners.
      - name: Run specs only
        run: bundle exec rake spec
        if: "contains(matrix.ruby-version, 'jruby') || matrix.ruby-version == 'truffleruby' || matrix.os == 'windows-latest'"
